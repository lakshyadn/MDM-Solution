services:
  - type: web
    name: data-discrepancy-backend
    runtime: python
    rootDir: data-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: /var/data/chroma_data
      - key: OUTPUT_DIR
        value: /var/data/outputs
      - key: DATA_ANALYZE_ARTIFACTS_DIR
        value: /var/data/data_analyze_artifacts
    disk:
      name: data-discrepancy-disk
      mountPath: /var/data
      sizeGB: 1
